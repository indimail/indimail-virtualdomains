name: courier-imap Ubuntu, Mac OSX CI

on:
  push:
    paths:
      - '**/courier-imap-x/**'
      - .github/workflows/courier-imap-c-cpp.yml
      - '!**/doc/*'
      - '!**.md'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.host }}-${{ matrix.config.name }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-latest, macos-latest]

    steps:
    - name: extra_packages
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          brew install automake autoconf libtool pkgconfig libidn2 pcre pcre2 berkeley-db gdbm openssl
        fi
        if [ "${OS}" = "ubuntu-latest" ] ; then
          sudo apt-get install gcc g++ automake autoconf libtool libpam0g-dev \
            libpcre3-dev libgdbm-dev libdb-dev libgcrypt20-dev libssl-dev libidn2-dev
        fi
      env:
        OS: ${{ matrix.host }}

    - name: checkout_main
      uses: actions/checkout@v4

    - name: build courier-imap
      run: |
        cd courier-imap-x
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          export OPENSSL_PREFIX

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib -Wl,-not_for_dyld_shared_cache"
        fi
        ./default.configure
        make
      env:
        OS: ${{ matrix.host }}
